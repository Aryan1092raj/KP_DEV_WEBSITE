name: Backend Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-health:
    runs-on: ubuntu-latest
    env:
      BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL }}
    steps:
      - name: Validate configured URL
        run: |
          if [ -z "$BACKEND_HEALTHCHECK_URL" ]; then
            echo "Missing secret BACKEND_HEALTHCHECK_URL"
            exit 1
          fi

      - name: Ping backend health endpoint
        run: |
          curl --fail --silent --show-error --max-time 20 "$BACKEND_HEALTHCHECK_URL"
          echo "Backend health ping succeeded"
